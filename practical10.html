<!DOCTYPE html>
<html>
<head>
    <title> Practicalno_10 Frames with Map and External Page</title>
</head>

<body>
    <h4>Practical - 10</h4>
    <h1>Vedanth Paspulwar</h1>
    <h3>Roll No: CS25188</h3>
    <h2 style="text-align:center;">This is HTML Frames (iframe) Example</h2>

    <table width="100%" height="500px" border="1">
        <tr>
            
            <td width="30%">
                <h3>Menu</h3>
                <ul>
                    <li><a href="https://www.wikipedia.org" target="rightFrame">Open Wikipedia</a></li>
                    <li><a href="https://www.google.com" target="rightFrame">Open Google</a></li>
                    <li><a href="https://www.youtube.com" target="rightFrame">Open YouTube</a></li>
                </ul>
            </td>

            
            <td width="70%">
                <iframe name="rightFrame" width="100%" height="100%">
                </iframe>
            </td>
        </tr>
    </table>
    <br><br>
    <h3>Embedded External Website</h3>
    <iframe 
        src="https://www.wikipedia.org" 
        width="100%" 
        height="400">
    </iframe>

</body>
</html>
